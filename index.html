<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAC | حملة الأضاحي</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --iac-primary: #1b8f4c; --bg-color: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg-color); margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: var(--iac-primary); color: white; padding: 20px; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .container { max-width: 500px; margin: 0 auto; }
        #reader { width: 100%; border-radius: 12px; background: #000; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: none; margin-top: 20px; border-right: 5px solid var(--iac-primary); }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; }
        .status { padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; margin-top: 15px; }
        .pending { background: #fff3cd; color: #856404; }
        .delivered { background: #d4edda; color: #155724; }
        .btn-deliver { width: 100%; padding: 15px; background: var(--iac-primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
        .input-group { display: flex; gap: 5px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🐐 حملة الأضاحي</h2>
    <p>نظام التسليم السريع (JSONP)</p>
</div>

<div class="main">
    <div class="container">
        <div id="reader"></div>
        <div class="input-group">
            <input type="text" id="idInput" placeholder="أدخل ID المستفيد...">
            <button onclick="fetchBeneficiary(document.getElementById('idInput').value)" style="background:var(--iac-primary); color:white; border:none; padding:0 15px; border-radius:8px; cursor:pointer">بحث</button>
        </div>

        <div id="infoCard" class="card">
            <h3 style="margin:0 0 15px; color:var(--iac-primary)">بيانات المستفيد</h3>
            <div class="info-row"><span>الاسم:</span> <b id="resName"></b></div>
            <div class="info-row"><span>القرين:</span> <b id="resSpouse"></b></div>
            <div class="info-row"><span>ID:</span> <b id="resId"></b></div>
            <div id="statusBox" class="status"></div>
            <button id="deliverBtn" class="btn-deliver" onclick="processDelivery()">تأكيد عملية التسليم</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyVwQGjOSwuOWfOyA3WL2MXVV6DA7VaQJx8aVnEiBO7rAGFyNLyLAbZqjmMH0RyscuWgQ/exec";
    let currentId = "";

    // --- JSONP ENGINE ---
    function jsonp(url, callbackName) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = `${url}&callback=${callbackName}`;
            window[callbackName] = (data) => {
                resolve(data);
                document.body.removeChild(script);
                delete window[callbackName];
            };
            script.onerror = reject;
            document.body.appendChild(script);
        });
    }

    // --- SCANNER ---
    function onScanSuccess(decodedText) { fetchBeneficiary(decodedText); }
    let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    scanner.render(onScanSuccess);

    // --- ACTIONS ---
    async function fetchBeneficiary(id) {
        if(!id) return;
        currentId = id.trim();
        try {
            // استخدام تكتيك JSONP للالتفاف على CORS
            const res = await jsonp(`${SCRIPT_URL}?action=getBeneficiary&id=${currentId}`, "handleBeneficiary");
            if(res.status === "success") showData(res.data);
            else alert("⚠️ المستفيد غير موجود");
        } catch (e) { alert("خطأ في الاتصال"); }
    }

    function showData(data) {
        document.getElementById('infoCard').style.display = 'block';
        document.getElementById('resName').innerText = data.name;
        document.getElementById('resSpouse').innerText = data.spouse;
        document.getElementById('resId').innerText = data.id;

        const box = document.getElementById('statusBox');
        const btn = document.getElementById('deliverBtn');
        
        if(data.isDelivered) {
            box.className = "status delivered";
            box.innerText = "✅ تم الاستلام مسبقاً";
            btn.style.display = "none";
        } else {
            box.className = "status pending";
            box.innerText = "⏳ جاهز للتسليم";
            btn.style.display = "block";
        }
    }

    async function processDelivery() {
        if(!confirm("تأكيد التسليم؟")) return;
        try {
            const res = await jsonp(`${SCRIPT_URL}?action=markAsDelivered&id=${currentId}`, "handleDelivery");
            if(res.status === "success") {
                alert("🎉 تم التسليم بنجاح");
                fetchBeneficiary(currentId);
            }
        } catch (e) { alert("خطأ في التحديث"); }
    }
</script>
</body>
</html>
