<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAC | حملة الأضاحي</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body { font-family: Arial; background:#f4f4f4; margin:0; }
.container { padding:20px; max-width:500px; margin:auto; }

input, button {
  padding:12px; margin:5px 0; width:100%;
  border-radius:10px; border:1px solid #ccc;
}

button { background:#1b8f4c; color:white; font-weight:bold; }

.card {
  background:white; padding:20px; border-radius:15px;
  margin-top:20px; display:none;
}

.status-box { padding:10px; margin-top:10px; border-radius:10px; }
.delivered { background:#e6f7ef; color:green; }
.not-delivered { background:#fff4e5; color:orange; }

img { max-width:100%; margin-top:15px; border-radius:10px; }

#reader { width:100%; }
#cam-container {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:black; display:none; justify-content:center; align-items:center;
}
</style>
</head>

<body>

<div class="container">

<input type="text" id="idInput" placeholder="أدخل ID">
<button onclick="fetchData(idInput.value)">بحث</button>
<button onclick="startScan()">📷 مسح باركود</button>

<div id="resultCard" class="card">
  <div>الاسم: <span id="resName"></span></div>
  <div>الزوجة: <span id="resSpouse"></span></div>
  <div>ID: <span id="resId"></span></div>

  <div id="statusBox" class="status-box"></div>

  <button id="deliverBtn" onclick="confirmDelivery()">إتمام التسليم</button>
</div>

</div>

<!-- كاميرا QR -->
<div id="cam-container">
  <div id="reader"></div>
</div>

<!-- input الكاميرا -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_bv9ATBHaCji2MkmCb8406_xNXurBO7g6lE94UgxXgfVCXbC5MhpV1pkV0YB_sdNodQ/exec";

let currentId = "";
let html5QrCode;

// ================= JSONP =================
function jsonp(url) {
  return new Promise((resolve) => {
    const cb = 'cb' + Date.now();
    const s = document.createElement('script');

    s.src = `${url}&callback=${cb}`;

    window[cb] = (data) => {
      delete window[cb];
      s.remove();
      resolve(data);
    };

    document.body.appendChild(s);
  });
}

// ================= البحث =================
async function fetchData(id) {
  if (!id) return;

  currentId = id.trim();
  document.getElementById('resultCard').style.display = 'none';

  const res = await jsonp(`${SCRIPT_URL}?action=getBeneficiary&id=${currentId}`);

  if (res.status === "success") {
    showResult(res.data);
  } else {
    alert("غير موجود");
  }
}

// ================= عرض البيانات =================
function showResult(data) {

  const card = document.getElementById('resultCard');
  card.style.display = 'block';

  document.getElementById('resName').innerText = data.name;
  document.getElementById('resSpouse').innerText = data.spouse;
  document.getElementById('resId').innerText = data.id;

  const box = document.getElementById('statusBox');
  const btn = document.getElementById('deliverBtn');

  // حذف القديم
  const oldImg = document.getElementById("previewImage");
  const oldBtn = document.getElementById("viewImageBtn");
  if (oldImg) oldImg.remove();
  if (oldBtn) oldBtn.remove();

  if (data.isDelivered) {

    box.className = "status-box delivered";
    box.innerText = "✅ تم الاستلام مسبقاً";

    btn.style.display = "none";

    if (data.image) {
      const viewBtn = document.createElement("button");
      viewBtn.id = "viewImageBtn";
      viewBtn.innerText = "📷 عرض الصورة";

      viewBtn.onclick = () => showImage(data.image);

      card.appendChild(viewBtn);
    }

  } else {

    box.className = "status-box not-delivered";
    box.innerText = "⏳ جاهز للتسليم";

    btn.style.display = "block";
  }
}

// ================= عرض الصورة =================
function showImage(url) {

  let img = document.getElementById("previewImage");

  if (!img) {
    img = document.createElement("img");
    img.id = "previewImage";
    document.getElementById("resultCard").appendChild(img);
  }

  img.src = url;
}

// ================= التسليم (يفتح الكاميرا) =================
function confirmDelivery() {
  openCamera();
}

// ================= التقاط صورة =================
function openCamera() {

  const input = document.getElementById("cameraInput");
  input.value = "";
  input.click();

  input.onchange = () => {

    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onloadend = async () => {

      const base64 = reader.result;

      const res = await jsonp(
        `${SCRIPT_URL}?action=markAsDelivered&id=${currentId}&image=${encodeURIComponent(base64)}`
      );

      if (res.status === "success") {
        alert("تم التسليم");
        fetchData(currentId);
      } else {
        alert("خطأ");
      }
    };

    reader.readAsDataURL(file);
  };
}

// ================= QR Scanner =================
function startScan() {

  document.getElementById('cam-container').style.display = 'flex';

  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {
      stopScan();
      fetchData(text);
    }
  );
}

function stopScan() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => {
      document.getElementById('cam-container').style.display = 'none';
    });
  }
}

</script>

</body>
</html>
