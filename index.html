<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IAC - Sacrifice</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
  --primary: #0a5c2f;
  --accent: #1db954;
  --bg: #eef3ef;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: rgba(10,92,47,0.95);
  backdrop-filter: blur(10px);
  color: white;
  display: flex;
  align-items: center;
  padding: 10px;
  gap: 10px;
  z-index: 1000;
}

.menu-btn {
  font-size: 20px;
  cursor: pointer;
}

.header img {
  width: 35px;
}

.header span {
  font-size: 15px;
  font-weight: bold;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  right: -260px;
  top: 0;
  width: 250px;
  height: 100%;
  background: var(--primary);
  color: white;
  padding: 20px;
  transition: 0.3s;
  z-index: 2000;
}

.sidebar.open {
  right: 0;
}

.sidebar h2 {
  text-align: center;
}

.menu button {
  width: 100%;
  background: none;
  border: none;
  color: white;
  padding: 15px;
  text-align: right;
  font-size: 16px;
  cursor: pointer;
}

/* CONTAINER */
.container {
  padding: 12px;
  max-width: 420px;
  margin: auto;
}

/* STATUS */
.status {
  padding: 10px;
  border-radius: 12px;
  text-align: center;
  margin-bottom: 10px;
  font-weight: bold;
  background: white;
}

/* INPUT */
.input-group {
  display: flex;
  gap: 8px;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: white;
  font-size: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* BUTTON */
button {
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--primary);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:active {
  transform: scale(0.96);
}

.scan-btn {
  width: 100%;
  margin-top: 10px;
  background: linear-gradient(135deg, #0a5c2f, #1db954);
}

/* CARD */
.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 18px;
  margin-top: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  animation: fadeIn 0.3s ease;
}

.id-card {
  border-right: 6px solid var(--primary);
}

.ok { color: #1db954; font-weight: bold; }
.no { color: #ff3b30; font-weight: bold; }

/* LOADER */
.loader {
  width: 30px;
  height: 30px;
  border: 4px solid #ddd;
  border-top: 4px solid var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h2>القائمة</h2>
  <div class="menu">
    <button>📦 توزيع الأضاحي</button>
    <button>📊 التقارير (قريبًا)</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <span class="menu-btn" onclick="toggleMenu()">☰</span>
  <img src="https://i.postimg.cc/BvLv7FDL/images.jpg">
  <span>مؤسسة الإغاثة - حملة الأضاحي</span>
</div>

<!-- CONTENT -->
<div class="container">

<div id="status" class="status">جاهز للعمل</div>

<div class="input-group">
  <input id="idInput" placeholder="ادخل ID أو امسح QR">
  <button onclick="search()">بحث</button>
</div>

<button class="scan-btn" onclick="startScanner()">📷 مسح الباركود</button>

<div id="reader"></div>

<div id="result"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbz60lRvHE4P3RGj7v82xtqA5v056vF2svRgNJEKh50ypJLA9DebMHdmq7K2_y7r8xFtHw/exec";

/* MENU */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("open");
}

/* STATUS */
function setStatus(msg){
  const el = document.getElementById("status");
  el.innerText = msg;

  if(msg.includes("تم")){
    el.style.background = "#e6f9ed";
  } else if(msg.includes("خطأ") || msg.includes("غير")){
    el.style.background = "#ffeaea";
  } else {
    el.style.background = "white";
  }
}

/* LOADER */
function loader(){
  document.getElementById("result").innerHTML = "<div class='loader'></div>";
}

/* SEARCH */
function search(){
  const id = document.getElementById("idInput").value.trim();
  if(!id) return;

  setStatus("🔍 جارِ البحث...");
  loader();

  const script = document.createElement("script");

  window.handleResponse = function(data){
    if(data.error){
      setStatus("❌ غير موجود");
      document.getElementById("result").innerHTML="";
    }else{
      setStatus("✅ تم العثور");
      render(data);
    }
    document.body.removeChild(script);
  };

  script.src = `${API_URL}?id=${id}&callback=handleResponse`;
  document.body.appendChild(script);
}

/* RENDER */
function render(d){
  let html = `
    <div class="card id-card">
      <h3>${d.name}</h3>
      <p>ID: ${d.id}</p>
      <p>القرين: ${d.partner}</p>
      <p>📞 ${d.phone}</p>
    </div>
  `;

  if(d.delivered){
    html += `<div class="card"><p class="ok">✔ تم الاستلام</p></div>`;
  }else{
    html += `
      <div class="card">
        <p class="no">❌ لم يتم الاستلام</p>
        <button onclick="deliver('${d.id}')">تسليم</button>
      </div>
    `;
  }

  document.getElementById("result").innerHTML = html;
}

/* DELIVER */
function deliver(id){
  setStatus("⏳ جاري التسليم...");
  loader();

  const script = document.createElement("script");

  window.handleDeliver = function(){
    setStatus("✅ تم التسليم");
    document.getElementById("idInput").value = id;
    search();
    document.body.removeChild(script);
  };

  script.src = `${API_URL}?id=${id}&action=deliver&callback=handleDeliver`;
  document.body.appendChild(script);
}

/* SCANNER */
let scanner;

function startScanner(){
  setStatus("📷 تشغيل الكاميرا...");

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text)=>{
      setStatus("📷 تم المسح");
      document.getElementById("idInput").value = text;
      scanner.stop();
      search();
    }
  );
}

</script>

</body>
</html>
