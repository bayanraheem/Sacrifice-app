<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAC | حملة الأضاحي</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --iac-primary: #1b8f4c;
            --iac-accent: #d4af37; /* لون ذهبي بسيط للأضاحي */
            --bg-color: #f4f7f6;
            --glass: rgba(255, 255, 255, 0.98);
        }
        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0; background: var(--bg-color);
            display: flex; height: 100vh; overflow: hidden;
        }
        /* Side Bar */
        .sidebar {
            width: 260px; background: var(--iac-primary); color: white;
            display: flex; flex-direction: column; padding: 20px;
        }
        .sidebar h2 { font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px; }
        .nav-btn {
            background: rgba(255,255,255,0.1); border: none; color: white;
            padding: 12px; border-radius: 8px; cursor: pointer; text-align: right;
            font-family: inherit; transition: 0.3s; margin-top: 10px;
        }
        .nav-btn.active { background: var(--iac-accent); color: #000; font-weight: bold; }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .header-badge {
            background: white; padding: 20px; border-radius: 15px;
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px;
        }
        .header-badge h1 { color: var(--iac-primary); margin: 0; font-size: 1.5rem; }
        .header-badge p { margin: 5px 0 0; color: #666; font-size: 0.9rem; }

        /* Scanner Box */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: none !important; box-shadow: var(--shadow); }
        .input-group { display: flex; gap: 10px; margin-top: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn-search { background: var(--iac-primary); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; }

        /* Info Cards */
        .card {
            background: var(--glass); padding: 20px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: 20px;
            border-right: 5px solid var(--iac-primary); display: none;
        }
        .card h3 { margin-top: 0; color: #333; font-size: 1.1rem; }
        .info-row { display: flex; justify-content: space-between; margin: 10px 0; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .label { color: #888; }
        .value { font-weight: bold; color: #2c3e50; }

        /* Status Card */
        .status-card {
            margin-top: 15px; padding: 20px; border-radius: 15px; text-align: center;
            display: none; font-weight: bold;
        }
        .pending { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .delivered { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        .btn-deliver {
            width: 100%; padding: 15px; background: var(--iac-primary);
            color: white; border: none; border-radius: 10px; font-size: 1.1rem;
            font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn-deliver:hover { background: var(--iac-dark); transform: translateY(-2px); }

        /* Loading Spinner */
        .spinner { display: none; border: 3px solid #f3f3f3; border-top: 3px solid var(--iac-primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🐐 حملة الأضاحي 2026</h2>
    <button class="nav-btn active">مركز التسليم</button>
</div>

<div class="main-content">
    <div class="container">
        <div class="header-badge">
            <h1>مؤسسة IAC للإغاثة</h1>
            <p>نظام إدارة توزيع الأضاحي المباركة</p>
        </div>

        <div id="reader"></div>
        
        <div class="input-group">
            <input type="text" id="idInput" placeholder="أدخل رقم ID المستفيد يدوياً...">
            <button class="btn-search" onclick="fetchBeneficiary(document.getElementById('idInput').value)">بحث</button>
        </div>

        <div id="loading" class="spinner"></div>

        <div id="infoCard" class="card">
            <h3>بيانات المستفيد</h3>
            <div class="info-row"><span class="label">الاسم:</span> <span class="value" id="resName"></span></div>
            <div class="info-row"><span class="label">اسم القرين:</span> <span class="value" id="resSpouse"></span></div>
            <div class="info-row"><span class="label">الـ ID:</span> <span class="value" id="resId"></span></div>
        </div>

        <div id="statusCard" class="status-card"></div>

        <button id="deliverBtn" class="btn-deliver" style="display:none;" onclick="processDelivery()">تأكيد عملية التسليم الآن</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQVH29h5f0s9r1cQIilcu0QatYQErPBwIa8wOZgZagW8IHp7NPsnLGuEn6cThIks1aVA/exec";
    let currentId = "";

    // تشغيل القارئ
    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facemode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        fetchBeneficiary(text);
    });

    async function fetchBeneficiary(id) {
        if(!id) return;
        currentId = id;
        document.getElementById('loading').style.display = 'block';
        hideElements();

        try {
            const response = await fetch(`${SCRIPT_URL}?action=getBeneficiary&id=${id}`);
            const res = await response.json();
            
            if(res.status === "success") {
                showData(res.data);
            } else {
                alert("⚠️ لم يتم العثور على هذا الـ ID");
            }
        } catch (e) { alert("خطأ في الاتصال بالسيرفر"); }
        document.getElementById('loading').style.display = 'none';
    }

    function showData(data) {
        document.getElementById('infoCard').style.display = 'block';
        document.getElementById('resName').innerText = data.name;
        document.getElementById('resSpouse').innerText = data.spouse;
        document.getElementById('resId').innerText = data.id;

        const statusCard = document.getElementById('statusCard');
        statusCard.style.display = 'block';

        if(data.isDelivered) {
            statusCard.className = "status-card delivered";
            statusCard.innerText = "✅ تم الاستلام مسبقاً";
            document.getElementById('deliverBtn').style.display = 'none';
        } else {
            statusCard.className = "status-card pending";
            statusCard.innerText = "⏳ لم يتم الاستلام بعد";
            document.getElementById('deliverBtn').style.display = 'block';
        }
    }

    async function processDelivery() {
        if(!confirm("هل أنت متأكد من تسليم الأضحية للمستفيد؟")) return;
        
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch(`${SCRIPT_URL}?action=markAsDelivered&id=${currentId}`);
            const res = await response.json();
            if(res.status === "success") {
                alert("🎉 تم التسليم بنجاح");
                fetchBeneficiary(currentId); // تحديث الحالة
            }
        } catch (e) { alert("حدث خطأ أثناء التحديث"); }
        document.getElementById('loading').style.display = 'none';
    }

    function hideElements() {
        document.getElementById('infoCard').style.display = 'none';
        document.getElementById('statusCard').style.display = 'none';
        document.getElementById('deliverBtn').style.display = 'none';
    }
</script>
</body>
</html>
