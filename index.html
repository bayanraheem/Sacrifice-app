<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IAC | نظام إدارة الأضاحي</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --iac-primary: #1b8f4c;
            --iac-accent: #2ecc71;
            --iac-dark: #0a4d29;
            --bg-color: #f0f4f3;
            --white: #ffffff;
            --text-dark: #2c3e50;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 0;
            background: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: var(--white);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: var(--shadow);
        }

        .menu-btn {
            font-size: 24px;
            cursor: pointer;
            color: var(--iac-primary);
            padding: 5px;
        }

        .header-logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo { width: 40px; height: 40px; object-fit: contain; border-radius: 8px; }
        .header-title { font-size: 0.9rem; font-weight: 800; color: var(--iac-primary); }

        /* --- Sidebar --- */
        .sidebar {
            position: fixed; top: 0; right: -280px;
            width: 280px; height: 100%;
            background: var(--white);
            z-index: 2000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            padding: 40px 20px;
        }
        .sidebar.active { right: 0; }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none; z-index: 1999;
        }
        .overlay.active { display: block; }

        .nav-link {
            display: flex; align-items: center; gap: 12px;
            padding: 15px; border-radius: 12px;
            margin-bottom: 10px; cursor: pointer;
            font-weight: 700; color: var(--text-dark);
            transition: 0.3s;
        }
        .nav-link:hover, .nav-link.active {
            background: #f0fdf4;
            color: var(--iac-primary);
        }

        /* --- Content Containers --- */
        .page { display: none; padding: 20px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Home Page Styles --- */
        .search-area {
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: var(--card-shadow); margin-bottom: 25px;
        }
        .input-row { display: flex; gap: 8px; margin-bottom: 15px; }
        input[type="text"] {
            flex: 1; padding: 14px; border: 2px solid #f1f5f4;
            border-radius: 12px; outline: none; font-family: inherit;
        }
        input:focus { border-color: var(--iac-primary); }
        .btn-search { background: var(--iac-primary); color: white; border: none; padding: 0 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-scan { width: 100%; padding: 16px; background: #f0fdf4; color: var(--iac-primary); border: 2px dashed var(--iac-primary); border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .result-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: var(--card-shadow); border-top: 6px solid var(--iac-primary); padding: 25px; }
        .data-row { margin-bottom: 15px; border-bottom: 1px solid #f0f4f3; padding-bottom: 10px; }
        .data-row label { font-size: 0.75rem; color: #8898aa; display: block; }
        .data-row span { font-size: 1.1rem; font-weight: 700; }
        .status-box { padding: 12px; border-radius: 12px; text-align: center; font-weight: 800; margin-top: 10px; }
        .not-delivered { background: #fff4e5; color: #d48806; }
        .delivered { background: #e6f7ef; color: #1b8f4c; }
        .btn-confirm, .btn-view-photo { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: 800; margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-confirm { background: var(--iac-primary); color: white; }
        .btn-view-photo { background: var(--iac-primary); color: white; display: none; }
        #photoPreview { width: 100%; border-radius: 15px; margin-top: 15px; display: none; border: 3px solid var(--iac-primary); max-height: 250px; object-fit: cover; }

        /* --- Stats Page Styles --- */
        .stats-grid { display: grid; gap: 15px; margin-top: 20px; }
        .stat-card {
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: var(--card-shadow); text-align: center;
            border-bottom: 4px solid #ddd;
        }
        .stat-card.total { border-color: #3498db; }
        .stat-card.done { border-color: var(--iac-primary); }
        .stat-card.wait { border-color: #e74c3c; }
        .stat-value { font-size: 2.2rem; font-weight: 800; display: block; margin: 5px 0; color: var(--text-dark); }
        .stat-label { font-size: 0.9rem; font-weight: 700; color: #7f8c8d; }
        .refresh-btn { width: 100%; padding: 15px; background: var(--white); border: 2px solid var(--iac-primary); color: var(--iac-primary); border-radius: 15px; font-weight: 800; margin-top: 20px; cursor: pointer; }

        /* --- Camera Overlay --- */
        #cam-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: black; z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #reader { width: 90%; max-width: 400px; border-radius: 20px; border: 2px solid var(--iac-primary); overflow: hidden; }
        .cam-close { position: absolute; top: 30px; right: 30px; color: white; font-size: 2.5rem; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="menu-btn" onclick="toggleSidebar()">☰</div>
    <div class="header-logo-section">
        <span class="header-title">مؤسسة الإغاثة | حملة الأضاحي</span>
        <img src="https://i.postimg.cc/BvLv7FDL/images.jpg?raw=true" alt="Logo" class="logo">
    </div>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <h3 style="color: var(--iac-primary); border-bottom: 2px solid #eee; padding-bottom: 10px;">القائمة الرئيسية</h3>
    <div class="nav-link active" id="nav-home" onclick="navigateTo('home')">
        <span>🏠</span> الصفحة الرئيسية
    </div>
    <div class="nav-link" id="nav-stats" onclick="navigateTo('stats')">
        <span>📊</span> إحصائيات الحملة
    </div>
</div>

<div class="container">
    <div id="home-page" class="page active">
        <div class="search-area">
            <div class="input-row">
                <input type="text" id="idInput" placeholder="أدخل رقم الـ ID للمستفيد...">
                <button class="btn-search" onclick="fetchData(document.getElementById('idInput').value)">بحث</button>
            </div>
            <button class="btn-scan" onclick="startFastScan()">
                <span>📷</span> مسح باركود سريع
            </button>
        </div>

        <div id="resultCard" class="result-card" style="display: none;">
            <div class="data-row"><label>اسم المستفيد</label><span id="resName"></span></div>
            <div class="data-row"><label>اسم القرين</label><span id="resSpouse"></span></div>
            <div class="data-row"><label>رقم الـ ID</label><span id="resId"></span></div>
            <div id="statusBox" class="status-box"></div>
            <img id="photoPreview" src="">
            <button id="deliverBtn" class="btn-confirm" onclick="initiateDelivery()">📷 التقاط صورة وتسليم</button>
            <button id="viewPhotoBtn" class="btn-view-photo" onclick="showSavedPhoto()">🖼️ عرض صورة الاستلام</button>
        </div>
    </div>

    <div id="stats-page" class="page">
        <h2 style="text-align: center; color: var(--iac-primary);">📊 ملخص الحملة</h2>
        <div class="stats-grid">
            <div class="stat-card total">
                <span class="stat-label">إجمالي المستفيدين</span>
                <span id="stat-total" class="stat-value">0</span>
            </div>
            <div class="stat-card done">
                <span class="stat-label">تم التسليم</span>
                <span id="stat-delivered" class="stat-value" style="color: var(--iac-primary);">0</span>
            </div>
            <div class="stat-card wait">
                <span class="stat-label">بانتظار الاستلام</span>
                <span id="stat-remaining" class="stat-value" style="color: #e74c3c;">0</span>
            </div>
        </div>
        <button class="refresh-btn" onclick="loadStats()">🔄 تحديث الإحصائيات</button>
    </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

<div id="cam-container">
    <div class="cam-close" onclick="stopScan()">×</div>
    <div id="reader"></div>
    <p style="color:white; margin-top:20px;">جاري المسح الضوئي...</p>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzaEPsrujXSOAHfILwJZb3n2rdFv4r18V89in2edslWUt2kCpKGBqWVO-VpgCwJyzRbdA/exec";
    const CLOUD_NAME = "dtnpfucnd"; 
    const UPLOAD_PRESET = "images_database";

    let currentId = "";
    let savedPhotoUrl = "";
    let html5QrCode;

    // --- Navigation Logic ---
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function navigateTo(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        
        if(page === 'home') {
            document.getElementById('home-page').classList.add('active');
            document.getElementById('nav-home').classList.add('active');
        } else if(page === 'stats') {
            document.getElementById('stats-page').classList.add('active');
            document.getElementById('nav-stats').classList.add('active');
            loadStats();
        }
        toggleSidebar();
    }

    // --- Data Fetching ---
    function jsonp(url) {
        return new Promise((resolve) => {
            const cb = 'cb' + Date.now();
            const s = document.createElement('script');
            s.src = `${url}${url.includes('?') ? '&' : '?'}callback=${cb}`;
            window[cb] = (d) => { delete window[cb]; s.remove(); resolve(d); };
            document.body.appendChild(s);
        });
    }

    async function fetchData(id) {
        if (!id) return;
        currentId = id.trim();
        document.getElementById('resultCard').style.display = 'none';
        const res = await jsonp(`${SCRIPT_URL}?action=getBeneficiary&id=${currentId}`);
        if (res.status === "success") {
            showResult(res.data);
        } else {
            alert("⚠️ عذراً، المستفيد غير موجود.");
        }
    }

    function showResult(data) {
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('resName').innerText = data.name;
        document.getElementById('resSpouse').innerText = data.spouse;
        document.getElementById('resId').innerText = data.id;
        savedPhotoUrl = data.photoUrl;
        
        const box = document.getElementById('statusBox');
        const dBtn = document.getElementById('deliverBtn');
        const vBtn = document.getElementById('viewPhotoBtn');
        const preview = document.getElementById('photoPreview');

        preview.style.display = 'none';
        if (data.isDelivered) {
            box.className = "status-box delivered";
            box.innerText = "✅ تم الاستلام مسبقاً";
            dBtn.style.display = "none";
            vBtn.style.display = (savedPhotoUrl) ? "flex" : "none";
        } else {
            box.className = "status-box not-delivered";
            box.innerText = "⏳ جاهز للتسليم الآن";
            dBtn.style.display = "flex";
            vBtn.style.display = "none";
        }
    }

    async function loadStats() {
        const res = await jsonp(`${SCRIPT_URL}?action=getStats`);
        if (res.status === "success") {
            document.getElementById('stat-total').innerText = res.total;
            document.getElementById('stat-delivered').innerText = res.delivered;
            document.getElementById('stat-remaining').innerText = res.remaining;
        }
    }

    // --- Image Processing & Delivery ---
    function initiateDelivery() { document.getElementById('cameraInput').click(); }

    document.getElementById('cameraInput').onchange = async function(event) {
        const file = event.target.files[0];
        if (!file) return;
        const btn = document.getElementById('deliverBtn');
        const preview = document.getElementById('photoPreview');

        try {
            btn.disabled = true;
            btn.innerText = "⏳ جاري الرفع...";
            
            // ضغط الصورة قبل الرفع
            const compressedBlob = await compressImage(file, 1000);
            preview.src = URL.createObjectURL(compressedBlob);
            preview.style.display = 'block';

            const formData = new FormData();
            formData.append('file', compressedBlob);
            formData.append('upload_preset', UPLOAD_PRESET);

            const cloudRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST', body: formData
            });
            const cloudData = await cloudRes.json();

            const finalRes = await jsonp(`${SCRIPT_URL}?action=markAsDelivered&id=${currentId}&img=${encodeURIComponent(cloudData.secure_url)}`);
            
            if (finalRes.status === "success") {
                alert("✅ تم التسجيل والتسليم بنجاح");
                fetchData(currentId);
            }
        } catch (e) {
            alert("❌ حدث خطأ أثناء العملية");
            btn.disabled = false;
        }
    };

    function compressImage(file, maxWidth) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7);
                };
            };
        });
    }

    function showSavedPhoto() {
        const preview = document.getElementById('photoPreview');
        preview.src = savedPhotoUrl;
        preview.style.display = 'block';
        preview.scrollIntoView({ behavior: 'smooth' });
    }

    // --- QR Scanner ---
    async function startFastScan() {
        document.getElementById('cam-container').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        try {
            await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
                document.getElementById('idInput').value = text;
                stopScan();
                fetchData(text);
            });
        } catch (err) { stopScan(); }
    }

    function stopScan() {
        if (html5QrCode) {
            html5QrCode.stop().finally(() => { document.getElementById('cam-container').style.display = 'none'; });
        }
    }
</script>
</body>
</html>
