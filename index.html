<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IAC System</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
  --primary: #0a5c2f;
  --secondary: #e8f5ee;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #eef7f1, #ffffff);
}

/* HEADER */
.header {
  background: var(--primary);
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  padding: 15px;
  max-width: 400px;
  margin: auto;
}

/* STATUS BAR */
.status {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 15px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  font-weight: bold;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.primary {
  background: var(--primary);
  color: white;
}

.secondary {
  background: #ddd;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-top: 10px;
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-top: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  animation: fadeIn 0.4s ease;
}

.id-card {
  border-left: 5px solid var(--primary);
}

.status-ok {
  color: green;
  font-weight: bold;
}

.status-no {
  color: red;
  font-weight: bold;
}

/* LOADER */
.loader {
  border: 4px solid #eee;
  border-top: 4px solid var(--primary);
  border-radius: 50%;
  width: 25px;
  height: 25px;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="header">IAC Distribution</div>

<div class="container">

<div id="status" class="status">جاهز للعمل</div>

<!-- INPUT -->
<input type="text" id="manualId" placeholder="أدخل ID يدويًا">
<button class="btn secondary" onclick="searchManual()">بحث</button>

<!-- QR -->
<div id="reader" style="margin-top:15px;"></div>
<button class="btn primary" onclick="startScanner()">تشغيل الكاميرا</button>

<!-- RESULT -->
<div id="result"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyLdNxmekWrqytJMsqDzmZ3x8N7Ckt-LNdRnYBJlDtbYaUCZsDYmkQBI-fjDrm55MvyFg/exec";

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

function showLoader() {
  document.getElementById("result").innerHTML = "<div class='loader'></div>";
}

/* =========================
   SEARCH
========================= */
function searchManual() {
  const id = document.getElementById("manualId").value;
  if (!id) return;
  fetchData(id);
}

/* =========================
   FETCH DATA
========================= */
function fetchData(id) {
  setStatus("🔍 جارِ البحث...");
  showLoader();

  fetch(API_URL + "?id=" + id)
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        setStatus("❌ غير موجود");
        document.getElementById("result").innerHTML = "";
      } else {
        setStatus("✅ تم العثور");
        renderData(data);
      }
    });
}

/* =========================
   RENDER
========================= */
function renderData(data) {
  let html = `
    <div class="card id-card">
      <h3>${data.name}</h3>
      <p>ID: ${data.id}</p>
      <p>القرين: ${data.partner}</p>
      <p>📞 ${data.phone}</p>
    </div>
  `;

  if (data.delivered) {
    html += `
      <div class="card">
        <p class="status-ok">✔ تم الاستلام</p>
      </div>
    `;
  } else {
    html += `
      <div class="card">
        <p class="status-no">❌ لم يتم الاستلام</p>
        <button class="btn primary" onclick="deliver(${data.id})">تسليم</button>
      </div>
    `;
  }

  document.getElementById("result").innerHTML = html;
}

/* =========================
   DELIVER
========================= */
function deliver(id) {
  setStatus("⏳ جارِ تسجيل التسليم...");
  showLoader();

  fetch(API_URL + "?id=" + id + "&action=deliver")
    .then(res => res.json())
    .then(() => {
      setStatus("✅ تم التسليم بنجاح");
      fetchData(id);
    });
}

/* =========================
   QR SCANNER
========================= */
let scanner;

function startScanner() {
  setStatus("📷 تشغيل الكاميرا...");

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      setStatus("📷 تم المسح");
      scanner.stop();
      fetchData(decodedText);
    }
  );
}

</script>

</body>
</html>
