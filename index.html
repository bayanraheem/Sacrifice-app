<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IAC - Sacrifice</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
  --primary: #0a5c2f;
  --dark: #084524;
  --bg: #f4f7f5;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: var(--primary);
  color: white;
  height: 100vh;
  padding-top: 20px;
  position: fixed;
}

.sidebar h2 {
  text-align: center;
  font-size: 18px;
}

.menu {
  margin-top: 20px;
}

.menu button {
  width: 100%;
  background: none;
  border: none;
  color: white;
  padding: 15px;
  text-align: right;
  cursor: pointer;
  font-size: 16px;
}

.menu button:hover {
  background: rgba(255,255,255,0.1);
}

/* MAIN */
.main {
  margin-left: 220px;
  width: 100%;
}

/* HEADER */
.header {
  background: var(--primary);
  color: white;
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.header img {
  width: 40px;
}

.header span {
  font-size: 18px;
  font-weight: bold;
}

/* CONTENT */
.container {
  padding: 15px;
  max-width: 450px;
  margin: auto;
}

/* STATUS */
.status {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  margin-bottom: 10px;
  font-weight: bold;
}

/* INPUT */
.input-group {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

/* BUTTON */
button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: var(--primary);
  color: white;
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-top: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.id-card {
  border-left: 5px solid var(--primary);
}

.ok { color: green; font-weight: bold; }
.no { color: red; font-weight: bold; }

/* LOADER */
.loader {
  border: 4px solid #eee;
  border-top: 4px solid var(--primary);
  border-radius: 50%;
  width: 25px;
  height: 25px;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>القائمة</h2>
  <div class="menu">
    <button>📦 توزيع الأضاحي</button>
    <button>📊 التقارير (قريبًا)</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
  <img src="https://i.postimg.cc/BvLv7FDL/images.jpg">
  <span>مؤسسة الإغاثة - حملة الأضاحي</span>
</div>

<div class="container">

<div id="status" class="status">جاهز</div>

<div class="input-group">
  <input id="idInput" placeholder="ادخل ID أو امسح QR">
  <button onclick="search()">بحث</button>
</div>

<button style="width:100%;margin-top:10px;" onclick="startScanner()">📷 مسح QR</button>

<div id="reader"></div>

<div id="result"></div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbz60lRvHE4P3RGj7v82xtqA5v056vF2svRgNJEKh50ypJLA9DebMHdmq7K2_y7r8xFtHw/exec";

function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

function loader(){
  document.getElementById("result").innerHTML = "<div class='loader'></div>";
}

/* SEARCH (JSONP) */
function search(){
  const id = document.getElementById("idInput").value.trim();
  if(!id) return;

  setStatus("🔍 جارِ البحث...");
  loader();

  const script = document.createElement("script");

  window.handleResponse = function(data){
    if(data.error){
      setStatus("❌ غير موجود");
      document.getElementById("result").innerHTML="";
    }else{
      setStatus("✅ تم العثور");
      render(data);
    }
    document.body.removeChild(script);
  };

  script.src = `${API_URL}?id=${id}&callback=handleResponse`;
  document.body.appendChild(script);
}

/* RENDER */
function render(d){
  let html = `
    <div class="card id-card">
      <h3>${d.name}</h3>
      <p>ID: ${d.id}</p>
      <p>القرين: ${d.partner}</p>
      <p>📞 ${d.phone}</p>
    </div>
  `;

  if(d.delivered){
    html += `<div class="card"><p class="ok">✔ تم الاستلام</p></div>`;
  }else{
    html += `
      <div class="card">
        <p class="no">❌ لم يتم الاستلام</p>
        <button onclick="deliver('${d.id}')">تسليم</button>
      </div>
    `;
  }

  document.getElementById("result").innerHTML = html;
}

/* DELIVER */
function deliver(id){
  setStatus("⏳ جاري التسليم...");
  loader();

  const script = document.createElement("script");

  window.handleDeliver = function(){
    setStatus("✅ تم التسليم");
    document.getElementById("idInput").value = id;
    search();
    document.body.removeChild(script);
  };

  script.src = `${API_URL}?id=${id}&action=deliver&callback=handleDeliver`;
  document.body.appendChild(script);
}

/* SCANNER */
let scanner;

function startScanner(){
  setStatus("📷 تشغيل الكاميرا...");

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text)=>{
      setStatus("📷 تم المسح");
      document.getElementById("idInput").value = text;
      scanner.stop();
      search();
    }
  );
}

</script>

</body>
</html>
