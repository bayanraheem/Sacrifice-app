<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IAC | حملة الأضاحي</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --iac-primary: #1b8f4c;
            --iac-dark: #0a4d29;
            --bg-color: #f0f4f3;
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 0;
            background: var(--bg-color);
            color: #2c3e50;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        header {
            background: var(--white);
            color: var(--iac-primary);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: var(--shadow);
            border-bottom: 1px solid #eef2f1;
        }

        .header-right { display: flex; align-items: center; gap: 12px; }
        .logo { width: 45px; height: 45px; object-fit: contain; }
        .header-title { font-size: 0.95rem; font-weight: 800; line-height: 1.2; }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; }

        .search-area {
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: var(--card-shadow); margin-bottom: 25px;
        }

        .input-row { display: flex; gap: 8px; margin-bottom: 15px; }

        input[type="text"] {
            flex: 1; padding: 14px; border: 2px solid #f1f5f4;
            border-radius: 12px; outline: none; font-family: inherit; font-size: 1rem;
            transition: 0.3s; background: #f9fbfb;
        }
        input:focus { border-color: var(--iac-primary); background: white; }

        .btn-search {
            background: var(--iac-primary); color: white; border: none;
            padding: 0 20px; border-radius: 12px; font-weight: 700; cursor: pointer;
        }

        .btn-scan {
            width: 100%; padding: 16px; background: #f0fdf4;
            color: var(--iac-primary); border: 2px dashed var(--iac-primary);
            border-radius: 12px; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .result-card {
            background: white; border-radius: 25px; overflow: hidden;
            box-shadow: var(--card-shadow); display: none;
            border-top: 6px solid var(--iac-primary);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .card-body { padding: 25px; }
        .data-row { margin-bottom: 15px; border-bottom: 1px solid #f0f4f3; padding-bottom: 10px; }
        .data-row label { font-size: 0.8rem; color: #8898aa; display: block; margin-bottom: 4px; }
        .data-row span { font-size: 1.15rem; font-weight: 700; color: #32325d; }

        .status-box {
            padding: 15px; border-radius: 15px; text-align: center;
            font-weight: 800; margin-top: 10px; font-size: 0.95rem;
        }
        .not-delivered { background: #fff4e5; color: #d48806; border: 1px solid #ffe8cc; }
        .delivered { background: #e6f7ef; color: #1b8f4c; border: 1px solid #c3e6cb; }

        .btn-confirm, .btn-view-photo {
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            font-size: 1.1rem; font-weight: 800; margin-top: 15px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .btn-confirm {
            background: var(--iac-primary); color: white;
            box-shadow: 0 4px 15px rgba(27, 143, 76, 0.3);
        }

        .btn-view-photo {
            background: #3498db; color: white;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
            display: none;
        }

        #photoPreview {
            width: 100%; border-radius: 15px; margin-top: 15px; display: none;
            border: 3px solid var(--iac-primary);
            object-fit: cover; max-height: 300px;
        }

        #cam-container {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: black; z-index: 3000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #reader { width: 90%; max-width: 400px; border-radius: 20px; border: 2px solid var(--iac-primary); }
        .cam-close { position: absolute; top: 30px; right: 30px; color: white; font-size: 2.5rem; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="header-right">
        <img src="https://i.postimg.cc/BvLv7FDL/images.jpg?raw=true" alt="IAC Logo" class="logo">
        <span class="header-title">مؤسسة الإغاثة | حملة الأضاحي</span>
    </div>
</header>

<div class="container">
    <div class="search-area">
        <div class="input-row">
            <input type="text" id="idInput" placeholder="أدخل رقم الـ ID للمستفيد...">
            <button class="btn-search" onclick="fetchData(document.getElementById('idInput').value)">بحث</button>
        </div>
        <button class="btn-scan" onclick="startFastScan()">
            <span>📷</span>
            <span>مسح باركود سريع</span>
        </button>
    </div>

    <div id="resultCard" class="result-card">
        <div class="card-body">
            <div class="data-row"><label>اسم المستفيد</label><span id="resName"></span></div>
            <div class="data-row"><label>اسم القرين</label><span id="resSpouse"></span></div>
            <div class="data-row"><label>رقم الـ ID</label><span id="resId"></span></div>
            <div id="statusBox" class="status-box"></div>
            
            <img id="photoPreview" src="">

            <button id="deliverBtn" class="btn-confirm" onclick="initiateDelivery()">📷 التقاط صورة وتسليم</button>
            <button id="viewPhotoBtn" class="btn-view-photo" onclick="showSavedPhoto()">🖼️ عرض صورة الاستلام</button>
        </div>
    </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

<div id="cam-container">
    <div class="cam-close" onclick="stopScan()">×</div>
    <div id="reader"></div>
    <p style="color:white; margin-top:20px;">جاري المسح...</p>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2utOP-Wl2Z9F29X5kKIcKUGNeMDIQNiGXPnxP-IvSfkXtuLX2GemxuG-Cm8GAoNLGnA/exec";
    const CLOUD_NAME = "dtnpfucnd"; 
    const UPLOAD_PRESET = "images_database";

    let currentId = "";
    let savedPhotoUrl = "";
    let html5QrCode;

    function jsonp(url) {
        return new Promise((resolve) => {
            const cb = 'cb' + Date.now();
            const s = document.createElement('script');
            s.src = `${url}${url.includes('?') ? '&' : '?'}callback=${cb}`;
            window[cb] = (d) => {
                delete window[cb];
                s.remove();
                resolve(d);
            };
            document.body.appendChild(s);
        });
    }

    async function startFastScan() {
        document.getElementById('cam-container').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        try {
            await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
                document.getElementById('idInput').value = text;
                stopScan();
                fetchData(text);
            });
        } catch (err) { stopScan(); }
    }

    function stopScan() {
        if (html5QrCode) {
            html5QrCode.stop().finally(() => { document.getElementById('cam-container').style.display = 'none'; });
        }
    }

    async function fetchData(id) {
        if (!id) return;
        currentId = id.trim();
        document.getElementById('resultCard').style.display = 'none';
        const res = await jsonp(`${SCRIPT_URL}?action=getBeneficiary&id=${currentId}`);
        if (res.status === "success") {
            showResult(res.data);
        } else {
            alert("المستفيد غير موجود");
        }
    }

    function showResult(data) {
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('resName').innerText = data.name;
        document.getElementById('resSpouse').innerText = data.spouse;
        document.getElementById('resId').innerText = data.id;
        
        savedPhotoUrl = data.photoUrl; // تخزين رابط الصورة المسجلة
        
        const box = document.getElementById('statusBox');
        const dBtn = document.getElementById('deliverBtn');
        const vBtn = document.getElementById('viewPhotoBtn');
        const preview = document.getElementById('photoPreview');

        preview.style.display = 'none';

        if (data.isDelivered) {
            box.className = "status-box delivered";
            box.innerText = "✅ تم الاستلام مسبقاً";
            dBtn.style.display = "none";
            vBtn.style.display = (savedPhotoUrl) ? "flex" : "none";
        } else {
            box.className = "status-box not-delivered";
            box.innerText = "⏳ جاهز للتسليم الآن";
            dBtn.style.display = "flex";
            vBtn.style.display = "none";
        }
    }

    function showSavedPhoto() {
        const preview = document.getElementById('photoPreview');
        preview.src = savedPhotoUrl;
        preview.style.display = 'block';
        // تمرير الصفحة للصورة
        preview.scrollIntoView({ behavior: 'smooth' });
    }

    function initiateDelivery() {
        document.getElementById('cameraInput').click();
    }

    document.getElementById('cameraInput').onchange = async function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const btn = document.getElementById('deliverBtn');
        const preview = document.getElementById('photoPreview');

        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        btn.disabled = true;
        btn.innerText = "⏳ جاري الرفع والاعتماد...";

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        try {
            const cloudRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                method: 'POST', body: formData
            });
            const cloudData = await cloudRes.json();
            const imageUrl = cloudData.secure_url;

            const res = await jsonp(`${SCRIPT_URL}?action=markAsDelivered&id=${currentId}&img=${encodeURIComponent(imageUrl)}`);
            
            if (res.status === "success") {
                alert("✅ اكتملت العملية بنجاح");
                fetchData(currentId);
            }
        } catch (err) {
            alert("❌ خطأ: " + err);
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
