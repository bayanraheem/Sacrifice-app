<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IAC | نظام التوزيع</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --iac-primary: #1b8f4c; --iac-dark: #0a4d29; --bg-color: #f0f4f3; --white: #ffffff; --shadow: 0 4px 12px rgba(0, 0, 0, 0.05); --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: var(--bg-color); color: #2c3e50; }
        header { background: var(--white); color: var(--iac-primary); padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow); border-bottom: 1px solid #eef2f1; }
        .logo { width: 45px; height: 45px; object-fit: contain; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .search-area { background: white; padding: 20px; border-radius: 20px; box-shadow: var(--card-shadow); margin-bottom: 25px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 14px; border: 2px solid #f1f5f4; border-radius: 12px; outline: none; font-size: 1rem; background: #f9fbfb; }
        .btn-search { background: var(--iac-primary); color: white; border: none; padding: 0 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-scan { width: 100%; padding: 16px; background: #f0fdf4; color: var(--iac-primary); border: 2px dashed var(--iac-primary); border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .result-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: var(--card-shadow); display: none; border-top: 6px solid var(--iac-primary); animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .card-body { padding: 25px; }
        .data-row { margin-bottom: 15px; border-bottom: 1px solid #f0f4f3; padding-bottom: 10px; }
        .data-row label { font-size: 0.8rem; color: #8898aa; display: block; }
        .data-row span { font-size: 1.15rem; font-weight: 700; color: #32325d; }
        #webcam { width: 100%; border-radius: 15px; margin-top: 10px; display: none; border: 2px solid var(--iac-primary); }
        .status-box { padding: 15px; border-radius: 15px; text-align: center; font-weight: 800; margin-top: 10px; }
        .not-delivered { background: #fff4e5; color: #d48806; }
        .delivered { background: #e6f7ef; color: #1b8f4c; }
        .btn-confirm { width: 100%; padding: 18px; background: var(--iac-primary); color: white; border: none; border-radius: 15px; font-weight: 800; margin-top: 20px; cursor: pointer; }
        .btn-confirm:disabled { background: #ccc; cursor: not-allowed; }
        #cam-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: black; z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #reader { width: 90%; max-width: 400px; border-radius: 20px; overflow: hidden; }
        .cam-close { position: absolute; top: 30px; right: 30px; color: white; font-size: 2.5rem; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:12px;">
        <img src="https://i.postimg.cc/BvLv7FDL/images.jpg" class="logo">
        <span style="font-weight:800; font-size:0.9rem;">مؤسسة الإغاثة | الأضاحي</span>
    </div>
</header>

<div class="container">
    <div class="search-area">
        <div class="input-row">
            <input type="text" id="idInput" placeholder="رقم المستفيد...">
            <button class="btn-search" onclick="fetchData(document.getElementById('idInput').value)">بحث</button>
        </div>
        <button class="btn-scan" onclick="startFastScan()">📷 مسح باركود</button>
    </div>

    <div id="resultCard" class="result-card">
        <div class="card-body">
            <div class="data-row"><label>الاسم</label><span id="resName"></span></div>
            <div class="data-row"><label>القرين</label><span id="resSpouse"></span></div>
            <video id="webcam" autoplay playsinline></video>
            <canvas id="photoCanvas" style="display:none;"></canvas>
            <div id="statusBox" class="status-box"></div>
            <button id="deliverBtn" class="btn-confirm" onclick="handleDeliveryFlow()">التقاط صورة الهوية والتسليم</button>
        </div>
    </div>
</div>

<div id="cam-container">
    <div class="cam-close" onclick="stopScan()">×</div>
    <div id="reader"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxje2J0Vegn-2BRNGJDjeW68-7r9AJQcYFMCxVW746akkBlILXTsSarFng_-FDopbEEYw/exec";
    let currentId = "";
    let html5QrCode;
    let isCamOpen = false;

    async function fetchData(id) {
        if (!id) return;
        currentId = id.trim();
        const res = await jsonp(`${SCRIPT_URL}?action=getBeneficiary&id=${currentId}`);
        if (res.status === "success") {
            showResult(res.data);
        } else {
            alert("غير موجود");
        }
    }

    function showResult(data) {
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('resName').innerText = data.name;
        document.getElementById('resSpouse').innerText = data.spouse;
        const box = document.getElementById('statusBox');
        const btn = document.getElementById('deliverBtn');
        const video = document.getElementById('webcam');

        video.style.display = "none";
        isCamOpen = false;

        if (data.isDelivered) {
            box.className = "status-box delivered";
            box.innerText = "✅ تم الاستلام";
            btn.style.display = "none";
        } else {
            box.className = "status-box not-delivered";
            box.innerText = "⏳ جاهز للتسليم";
            btn.style.display = "block";
            btn.innerText = "التقاط صورة الهوية والتسليم";
        }
    }

    async function handleDeliveryFlow() {
        const video = document.getElementById('webcam');
        const btn = document.getElementById('deliverBtn');

        if (!isCamOpen) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.style.display = "block";
                btn.innerText = "اعتماد الصورة وإتمام التسليم";
                isCamOpen = true;
            } catch (err) { alert("افتح الكاميرا!"); }
        } else {
            uploadProcess();
        }
    }

    async function uploadProcess() {
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('photoCanvas');
        const btn = document.getElementById('deliverBtn');

        btn.disabled = true;
        btn.innerText = "⏳ جاري الرفع...";

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const imageData = canvas.toDataURL('image/jpeg', 0.5);

        // إغلاق الكاميرا
        video.srcObject.getTracks().forEach(track => track.stop());

        // إرسال البيانات (POST)
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    action: 'markAsDeliveredWithImage',
                    id: currentId,
                    image: imageData
                })
            });
            
            // بسبب no-cors لا ننتظر رداً حقيقياً، سننتظر 3 ثوانٍ ثم نحدث
            setTimeout(() => {
                alert("تم التسليم بنجاح");
                fetchData(currentId);
            }, 3000);

        } catch (e) {
            alert("خطأ في الرفع");
            btn.disabled = false;
        }
    }

    function jsonp(url) {
        return new Promise(resolve => {
            const cb = 'cb' + Date.now();
            const s = document.createElement('script');
            s.src = `${url}${url.includes('?') ? '&' : '?'}callback=${cb}`;
            window[cb] = d => { delete window[cb]; s.remove(); resolve(d); };
            document.body.appendChild(s);
        });
    }

    function startFastScan() {
        document.getElementById('cam-container').style.display = 'flex';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
            document.getElementById('idInput').value = text;
            stopScan();
            fetchData(text);
        });
    }

    function stopScan() {
        if (html5QrCode) html5QrCode.stop();
        document.getElementById('cam-container').style.display = 'none';
    }
</script>
</body>
</html>
